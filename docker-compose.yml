services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: betalent
      MYSQL_USER: betalent
      MYSQL_PASSWORD: betalent
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  gateways:
    image: matheusprotzen/gateways-mock
    ports:
      - '3001:3001'
      - '3002:3002'

  app:
    build: .
    depends_on:
      - db
      - gateways
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: info
      APP_KEY: 01234567890123456789012345678901
      APP_URL: http://localhost:3333
      SESSION_DRIVER: cookie
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: betalent
      DB_PASSWORD: betalent
      DB_DATABASE: betalent
      TEST_DB_DATABASE: betalent_test
      GATEWAY_1_URL: http://gateways:3001
      GATEWAY_1_EMAIL: dev@betalent.tech
      GATEWAY_1_TOKEN: FEC9BB078BF338F464F96B48089EB498
      GATEWAY_2_URL: http://gateways:3002
      GATEWAY_2_AUTH_TOKEN: tk_f2198cc671b5289fa856
      GATEWAY_2_AUTH_SECRET: 3d15e8ed6131446ea7e3456728b1211f
    ports:
      - '3333:3333'
    command: sh -c "node --import=@poppinss/ts-exec ./bin/console.ts migration:run && node --import=@poppinss/ts-exec ./bin/console.ts db:seed && node --import=@poppinss/ts-exec ./bin/console.ts serve --hmr"

volumes:
  db_data:
